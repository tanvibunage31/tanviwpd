<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPD PR.EX.12</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .main-image {
            width: 400px;
            border: 4px solid #4CAF50;
            border-radius: 12px;
            margin-top: 10px;
        }

        .thumb-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .thumb {
            width: 150px;
            border-radius: 8px;
            border: 2px solid #555;
        }

        .caption {
            font-size: 14px;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Gallery</h1>
    <p>Below are some formatted images:</p>

    <!-- Big main image -->
    <div>
        <img class="main-image"
             src="https://images.pexels.com/photos/414612/pexels-photo-414612.jpeg"
             alt="Beautiful Forest">
        <div class="caption">A River Scene</div>
    </div>

    <!-- Row of thumbnails -->
    <div class="thumb-container">
        <div>
            <img class="thumb"
                 src="https://images.pexels.com/photos/34950/pexels-photo.jpg"
                 alt="River">
            <div class="caption">Railway View</div>
        </div>

        <div>
            <img class="thumb"
                 src="https://images.pexels.com/photos/127028/pexels-photo-127028.jpeg"
                 alt="Mountains">
            <div class="caption">Cat</div>
        </div>

        <div>
            <img class="thumb"
                 src="https://images.pexels.com/photos/356378/pexels-photo-356378.jpeg"
                 alt="Desert">
            <div class="caption">Dog</div>
        </div>
    </div>

</body>
</html>
